{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: workflow-designer
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "openan.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
