#
# Auto-generated JWS signing certificate for registry-center.
# On first install: generates new self-signed certificate.
# On upgrade: preserves existing certificate (via lookup).
# To use custom certificate: set registry.signing.mode=secret.

{{- if and .Values.registry.enabled (eq .Values.registry.signing.mode "auto") }}
{{- $existingSigning := lookup "v1" "Secret" .Values.namespace "registry-center-signing" -}}
{{- if $existingSigning }}
# Reuse existing signing certificate to preserve JWS signature compatibility
apiVersion: v1
kind: Secret
metadata:
  name: registry-center-signing
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.registry.labels" . | nindent 4 }}
type: Opaque
data:
  server.cer: {{ index $existingSigning.data "server.cer" }}
  server_key.pem: {{ index $existingSigning.data "server_key.pem" }}
  cert_pwd: {{ index $existingSigning.data "cert_pwd" }}
{{- else }}
{{- $ca := genCA "OpenAN CA" 3650 -}}
{{- $signingCert := genSignedCert "registry-center-signing" nil nil 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: registry-center-signing
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.registry.labels" . | nindent 4 }}
type: Opaque
data:
  server.cer: {{ $signingCert.Cert | b64enc }}
  server_key.pem: {{ $signingCert.Key | b64enc }}
  cert_pwd: {{ "" | b64enc }}
{{- end }}
{{- end }}
