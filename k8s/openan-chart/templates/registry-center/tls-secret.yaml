# Auto-generated TLS certificate for registry-center.
# On first install: generates new self-signed certificate.
# On upgrade: preserves existing certificate (via lookup).
# To use custom certificate: set registry.tls.mode=secret.

{{- if and .Values.registry.enabled (eq .Values.registry.tls.mode "auto") }}
{{- $existingTls := lookup "v1" "Secret" .Values.namespace "registry-center-tls" -}}
{{- if $existingTls }}
# Reuse existing TLS certificate to preserve compatibility
apiVersion: v1
kind: Secret
metadata:
  name: registry-center-tls
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.registry.labels" . | nindent 4 }}
type: Opaque
data:
  server.cer: {{ index $existingTls.data "server.cer" }}
  server_key.pem: {{ index $existingTls.data "server_key.pem" }}
  trust.cer: {{ index $existingTls.data "trust.cer" }}
  cert_pwd: {{ index $existingTls.data "cert_pwd" }}
{{- else }}
{{- $ca := genCA "OpenAN CA" 3650 -}}
{{- $tlsCert := genSignedCert "registry-center" nil (list "registry-center" (printf "registry-center.%s.svc.cluster.local" .Values.namespace)) 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: registry-center-tls
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.registry.labels" . | nindent 4 }}
type: Opaque
data:
  server.cer: {{ $tlsCert.Cert | b64enc }}
  server_key.pem: {{ $tlsCert.Key | b64enc }}
  trust.cer: {{ $ca.Cert | b64enc }}
  cert_pwd: {{ "" | b64enc }}
{{- end }}
{{- end }}
