{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: registry-center
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.registry.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "openan.registry.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.registry.port }}
    targetPort: {{ .Values.registry.port }}
    protocol: TCP
    name: http
{{- end }}
