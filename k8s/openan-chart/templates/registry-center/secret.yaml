{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: registry-center-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.registry.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.postgresql.existingSecret }}
  db-password: {{ .Values.postgresql.password | quote }}
  {{- end }}
  {{- if .Values.registry.llm.chat.apiKey }}
  llm-chat-api-key: {{ .Values.registry.llm.chat.apiKey | quote }}
  {{- end }}
  {{- if .Values.registry.llm.embed.apiKey }}
  llm-embed-api-key: {{ .Values.registry.llm.embed.apiKey | quote }}
  {{- end }}
  {{- if .Values.registry.llm.rerank.apiKey }}
  llm-rerank-api-key: {{ .Values.registry.llm.rerank.apiKey | quote }}
  {{- end }}
{{- end }}
