{{- if .Values.orchestration.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: orchestration-center-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.orchestration.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.postgresql.existingSecret }}
  db-password: {{ .Values.postgresql.password | quote }}
  {{- end }}
  {{- if .Values.orchestration.llm.chat.apiKey }}
  llm-chat-api-key: {{ .Values.orchestration.llm.chat.apiKey | quote }}
  {{- end }}
  {{- if .Values.orchestration.a2at.apiKey }}
  a2at-llm-api-key: {{ .Values.orchestration.a2at.apiKey | quote }}
  {{- end }}
{{- end }}
