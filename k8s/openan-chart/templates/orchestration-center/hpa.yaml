{{- if and .Values.orchestration.enabled .Values.orchestration.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestration-center
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openan.orchestration.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchestration-center
  minReplicas: {{ .Values.orchestration.hpa.minReplicas }}
  maxReplicas: {{ .Values.orchestration.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.orchestration.hpa.targetCPUUtilization }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.orchestration.hpa.targetMemoryUtilization }}
{{- end }}
