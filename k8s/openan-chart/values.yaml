# =============================================================================
# OpenAN Platform Configuration
# =============================================================================

# Global settings
namespace: openan

# =============================================================================
# PostgreSQL Configuration (Shared)
# =============================================================================
postgresql:
  # Set to false to use external database
  enabled: true
  # External database settings (when enabled=false)
  externalHost: ""
  port: 5432
  # Database credentials
  # Use existingSecret to reference an existing K8S secret instead of defining password here
  existingSecret: ""
  password: "openan-db-password"
  # Storage
  storage: 20Gi
  storageClassName: ""
  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Database definitions
  databases:
    - name: registry_center
      user: registry
    - name: orchestration_center
      user: opena2a_t

# =============================================================================
# Registry Center Configuration (Required)
# =============================================================================
registry:
  enabled: true
  replicas: 2
  image:
    repository: registry-center
    tag: latest
    pullPolicy: Always
  port: 5000
  # LLM configuration for registry-center
  llm:
    chat:
      model: "deepseek-chat"
      url: "https://api.deepseek.com/v1/chat/completions"
      apiKey: ""
      existingSecret: ""
      existingSecretKey: "registry-llm-chat-api-key"
    embed:
      model: "bge-m3"
      url: ""
      apiKey: ""
      existingSecret: ""
      existingSecretKey: "registry-llm-embed-api-key"
    rerank:
      model: "bge-reranker-v2-m3"
      url: ""
      apiKey: ""
      existingSecret: ""
      existingSecretKey: "registry-llm-rerank-api-key"
  # VectorDB (optional, Milvus)
  vectordb:
    enabled: false
    host: ""
    port: 19530
  # TLS certificate configuration
  # mode: auto (Helm generates self-signed cert, stored in Secret) / secret (user-provided Secret) / off (entrypoint generates per-pod)
  # "auto" is recommended: generates once, persists in Secret, consistent across replicas and upgrades.
  tls:
    mode: auto
    existingSecret: ""  # Used when mode=secret. Secret containing server.cer, server_key.pem, trust.cer, cert_pwd
  # JWS signing certificate configuration
  # mode: auto (Helm generates self-signed cert, stored in Secret) / secret (user-provided Secret) / off (entrypoint generates per-pod)
  # "auto" is recommended: generates once, persists in Secret, consistent across replicas and upgrades.
  signing:
    mode: auto
    existingSecret: ""  # Used when mode=secret. Secret containing server.cer, server_key.pem, cert_pwd
  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Probes
  livenessProbe:
    httpGet:
      path: /rest/v1/registry-center/agent-cards
      port: 5000
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /rest/v1/registry-center/agent-cards
      port: 5000
    initialDelaySeconds: 10
    periodSeconds: 10

# =============================================================================
# Orchestration Center Configuration (Optional)
# =============================================================================
orchestration:
  # Set to false to skip orchestration-center deployment
  enabled: true
  replicas: 2
  image:
    repository: orchestration-center
    tag: latest
    pullPolicy: Always
  port: 5001
  # Registry Center URL (auto-discovered if registry.enabled=true)
  agentRegistryUrl: ""
  # LLM configuration for orchestration-center
  llm:
    chat:
      model: "deepseek-chat"
      url: "https://api.deepseek.com/v1/chat/completions"
      apiKey: ""
      existingSecret: ""
      existingSecretKey: "orchestration-llm-chat-api-key"
  # A2AT SDK configuration
  a2at:
    provider: "deepseek"
    model: "deepseek-chat"
    baseUrl: "https://api.deepseek.com"
    apiKey: ""
    existingSecret: ""
    existingSecretKey: "orchestration-a2at-llm-api-key"
  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # HPA
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  # Probes
  livenessProbe:
    httpGet:
      path: /rest/v1/orchestrate/agent-cards
      port: 5001
    initialDelaySeconds: 40
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /rest/v1/orchestrate/agent-cards
      port: 5001
    initialDelaySeconds: 10
    periodSeconds: 10
  startupProbe:
    httpGet:
      path: /rest/v1/orchestrate/agent-cards
      port: 5001
    failureThreshold: 12
    periodSeconds: 10

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: nginx
  host: openan.example.com
  # TLS configuration
  tls:
    enabled: false
    secretName: openan-tls
  # Annotations
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
