# BEFORE DEPLOYING: Update the image field to your registry path.
# Example: your-registry.com/orchestration-center:v1.0.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-center
  namespace: orchestration-center
  labels:
    app: orchestration-center
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestration-center
  template:
    metadata:
      labels:
        app: orchestration-center
    spec:
      terminationGracePeriodSeconds: 120
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: orchestration-center
              topologyKey: kubernetes.io/hostname
      containers:
      - name: orchestration-center
        image: orchestration-center:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        envFrom:
        - configMapRef:
            name: orchestration-center-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: orchestration-center-secret
              key: db-password
        - name: LLM_CHAT_API_KEY
          valueFrom:
            secretKeyRef:
              name: orchestration-center-secret
              key: llm-api-key
        - name: A2AT_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: orchestration-center-secret
              key: a2at-llm-api-key
        startupProbe:
          httpGet:
            path: /rest/v1/orchestrate/agent-cards
            port: 5001
          failureThreshold: 12
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /rest/v1/orchestrate/agent-cards
            port: 5001
          initialDelaySeconds: 40
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /rest/v1/orchestrate/agent-cards
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
